services:
  postgres:
    image: postgres:16
    container_name: workhours-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: workhours
      POSTGRES_PASSWORD: workhours_password
      POSTGRES_DB: workhours_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
